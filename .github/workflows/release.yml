name: release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Validate tag and package version
        run: |
          node -e '
          const fs = require("node:fs");
          const tag = process.env.GITHUB_REF_NAME || "";
          if (!tag.startsWith("v")) {
            throw new Error(`tag must start with v: ${tag}`);
          }
          const version = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const tagVersion = tag.slice(1);
          if (tagVersion !== version) {
            throw new Error(`tag/version mismatch: tag=${tagVersion} package=${version}`);
          }
          console.log(`release version verified: ${version}`);
          '

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack dry-run
        run: npm pack --dry-run

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --access public --provenance
